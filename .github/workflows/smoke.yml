name: smoke

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install CPU dependencies
        run: |
          python -m pip install --upgrade pip
          # CPU-only wheels so the runner (no GPU) installs cleanly
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install dgl -f https://data.dgl.ai/wheels/torch-2.3/repo.html
          pip install numpy scipy pyyaml
          pip install -e .

      - name: Smoke test (cora / GCN / transductive, 1 seed, 20 epochs, CPU)
        env:
          CUDA_VISIBLE_DEVICES: ""
          DGLBACKEND: pytorch
        run: |
          python -m infgrand.train \
            --config configs/cora_gcn_tran.yaml \
            --seeds 1 \
            --max-epoch 20 \
            --results-csv results/_smoke.csv
          echo "--- smoke result ---"
          cat results/_smoke.csv
