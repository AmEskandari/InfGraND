# coauthor-phy / GAT / transductive
# Hyperparameters as published in the paper (Appendix B, Table 6).
extends: _base.yaml
dataset: coauthor-phy
teacher: GAT
exp_setting: tran

num_layers: 2
hidden_dim: 256
dropout_t: 0.3
dropout_s: 0.4
learning_rate: 0.01

# --- InfGraND core hyperparameters ---
lamb: 0.2
tau: 1.4
delta_1: 0.8
delta_2: 0.8
gamma_1: 0.8
gamma_2: 0.8

# --- feature propagation (paper Eq. 5, 7) ---
propagation_hops: 2
