# amazon-photo / GAT / transductive
# Hyperparameters as published in the paper (Appendix B, Table 6).
extends: _base.yaml
dataset: amazon-photo
teacher: GAT
exp_setting: tran

num_layers: 3
hidden_dim: 256
dropout_t: 0.3
dropout_s: 0.3
learning_rate: 0.001

# --- InfGraND core hyperparameters ---
lamb: 0.3
tau: 1.4
delta_1: 0.6
delta_2: 0.1
gamma_1: 0.8
gamma_2: 0.01

# --- feature propagation (paper Eq. 5, 7) ---
propagation_hops: 4
