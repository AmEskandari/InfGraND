# cora / SAGE / inductive
# Hyperparameters as published in the paper (Appendix B, Table 6).
extends: _base.yaml
dataset: cora
teacher: SAGE
exp_setting: ind

num_layers: 3
hidden_dim: 512
dropout_t: 0.4
dropout_s: 0.3
learning_rate: 0.01

# --- InfGraND core hyperparameters ---
lamb: 0.5
tau: 1.3
delta_1: 1.0
delta_2: 0.2
gamma_1: 1.0
gamma_2: 0.2

# --- feature propagation (paper Eq. 5, 7) ---
propagation_hops: 4
