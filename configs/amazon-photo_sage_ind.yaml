# amazon-photo / SAGE / inductive
# Hyperparameters as published in the paper (Appendix B, Table 6).
extends: _base.yaml
dataset: amazon-photo
teacher: SAGE
exp_setting: ind

num_layers: 3
hidden_dim: 1024
dropout_t: 0.4
dropout_s: 0.4
learning_rate: 0.001

# --- InfGraND core hyperparameters ---
lamb: 0.2
tau: 1.5
delta_1: 0.9
delta_2: 0.4
gamma_1: 0.6
gamma_2: 0.1

# --- feature propagation (paper Eq. 5, 7) ---
propagation_hops: 2
