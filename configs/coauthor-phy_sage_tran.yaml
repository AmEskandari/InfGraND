# coauthor-phy / SAGE / transductive
# Hyperparameters as published in the paper (Appendix B, Table 6).
extends: _base.yaml
dataset: coauthor-phy
teacher: SAGE
exp_setting: tran

num_layers: 4
hidden_dim: 256
dropout_t: 0.4
dropout_s: 0.1
learning_rate: 0.01

# --- InfGraND core hyperparameters ---
lamb: 0.5
tau: 2
delta_1: 1
delta_2: 0.2
gamma_1: 0.2
gamma_2: 0.2

# --- feature propagation (paper Eq. 5, 7) ---
propagation_hops: 2
