# citeseer / GAT / inductive
# Hyperparameters as published in the paper (Appendix B, Table 6).
extends: _base.yaml
dataset: citeseer
teacher: GAT
exp_setting: ind

num_layers: 2
hidden_dim: 2048
dropout_t: 0.4
dropout_s: 0.5
learning_rate: 0.01

# --- InfGraND core hyperparameters ---
lamb: 0.1
tau: 1.0
delta_1: 0.9
delta_2: 0.8
gamma_1: 1.0
gamma_2: 0.2

# --- feature propagation (paper Eq. 5, 7) ---
propagation_hops: 4
