# coauthor-cs / GCN / inductive
# Hyperparameters as published in the paper (Appendix B, Table 6).
extends: _base.yaml
dataset: coauthor-cs
teacher: GCN
exp_setting: ind

num_layers: 2
hidden_dim: 1024
dropout_t: 0.5
dropout_s: 0.6
learning_rate: 0.01

# --- InfGraND core hyperparameters ---
lamb: 0.3
tau: 1.5
delta_1: 1.0
delta_2: 0.2
gamma_1: 1.0
gamma_2: 0.2

# --- feature propagation (paper Eq. 5, 7) ---
propagation_hops: 4
