# coauthor-cs / GAT / transductive
# Hyperparameters as published in the paper (Appendix B, Table 6).
extends: _base.yaml
dataset: coauthor-cs
teacher: GAT
exp_setting: tran

num_layers: 2
hidden_dim: 512
dropout_t: 0.6
dropout_s: 0.6
learning_rate: 0.01

# --- InfGraND core hyperparameters ---
lamb: 0.0
tau: 0.5
delta_1: 1.0
delta_2: 0.1
gamma_1: 0.01
gamma_2: 0.01

# --- feature propagation (paper Eq. 5, 7) ---
propagation_hops: 4
