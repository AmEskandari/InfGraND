# pubmed / GCN / inductive
# Hyperparameters as published in the paper (Appendix B, Table 6).
extends: _base.yaml
dataset: pubmed
teacher: GCN
exp_setting: ind

num_layers: 3
hidden_dim: 1024
dropout_t: 0.3
dropout_s: 0.8
learning_rate: 0.01

# --- InfGraND core hyperparameters ---
lamb: 0.5
tau: 2.0
delta_1: 1.0
delta_2: 0.2
gamma_1: 0.2
gamma_2: 1.0

# --- feature propagation (paper Eq. 5, 7) ---
propagation_hops: 1
