# amazon-photo / GCN / transductive
# Hyperparameters as published in the paper (Appendix B, Table 6).
extends: _base.yaml
dataset: amazon-photo
teacher: GCN
exp_setting: tran

num_layers: 3
hidden_dim: 2048
dropout_t: 0.5
dropout_s: 0.6
learning_rate: 0.001

# --- InfGraND core hyperparameters ---
lamb: 0.2
tau: 1.3
delta_1: 1
delta_2: 0.2
gamma_1: 0.8
gamma_2: 0.1

# --- feature propagation (paper Eq. 5, 7) ---
propagation_hops: 4
