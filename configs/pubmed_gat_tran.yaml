# pubmed / GAT / transductive
# Hyperparameters as published in the paper (Appendix B, Table 6).
extends: _base.yaml
dataset: pubmed
teacher: GAT
exp_setting: tran

num_layers: 2
hidden_dim: 2048
dropout_t: 0.3
dropout_s: 0.5
learning_rate: 0.01

# --- InfGraND core hyperparameters ---
lamb: 0
tau: 1.2
delta_1: 0.4
delta_2: 0.2
gamma_1: 0.4
gamma_2: 0.1

# --- feature propagation (paper Eq. 5, 7) ---
propagation_hops: 2
