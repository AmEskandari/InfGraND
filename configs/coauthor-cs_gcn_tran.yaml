# coauthor-cs / GCN / transductive
# Hyperparameters as published in the paper (Appendix B, Table 6).
extends: _base.yaml
dataset: coauthor-cs
teacher: GCN
exp_setting: tran

num_layers: 2
hidden_dim: 128
dropout_t: 0.7
dropout_s: 0.4
learning_rate: 0.01

# --- InfGraND core hyperparameters ---
lamb: 0.3
tau: 1.5
delta_1: 1.0
delta_2: 0.1
gamma_1: 0.5
gamma_2: 0.5

# --- feature propagation (paper Eq. 5, 7) ---
propagation_hops: 4
