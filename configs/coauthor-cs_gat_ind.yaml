# coauthor-cs / GAT / inductive
# Hyperparameters as published in the paper (Appendix B, Table 6).
extends: _base.yaml
dataset: coauthor-cs
teacher: GAT
exp_setting: ind

num_layers: 2
hidden_dim: 128
dropout_t: 0.4
dropout_s: 0.5
learning_rate: 0.01

# --- InfGraND core hyperparameters ---
lamb: 0.3
tau: 1.1
delta_1: 0.8
delta_2: 0.1
gamma_1: 0.6
gamma_2: 0.1

# --- feature propagation (paper Eq. 5, 7) ---
propagation_hops: 4
